<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minou's Math-Base: MathJax Edition</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']], // Erlaubt $...$ für Formeln im Text
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                renderActions: {
                    addMenu: [] // Entfernt das MathJax-Kontextmenü für saubereres UI
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #6366f1; --accent: #ec4899;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --text-dark: #1e293b; --text-light: #64748b;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 950px; width: 100%; display: flex; flex-direction: column; gap: 25px; }
        .top-section { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .chart-wrapper { position: relative; height: 320px; width: 100%; display: flex; justify-content: center; align-items: center; }
        .user-name { font-size: 2.5rem; font-weight: 700; margin: 0; background: linear-gradient(120deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .total-score { font-size: 2rem; font-weight: 600; margin-bottom: 15px; }
        .category-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #f1f5f9; }
        .category-header { padding: 18px 25px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .category-content { padding: 0 25px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: white; }
        .category-content.open { padding: 25px; max-height: 3000px; border-top: 1px solid #e2e8f0; }
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: not-allowed; border: 1px solid #e2e8f0; background: #f1f5f9; color: #94a3b8; }
        .pill.active { cursor: pointer; background-color: #dcfce7; color: #15803d; border-color: #86efac; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; max-height: 85vh; overflow-y: auto; }
        .task-raw { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .solution-step { background: white; border: 1px solid #e2e8f0; padding: 12px 16px; margin-bottom: 10px; border-radius: 10px; display: flex; gap: 10px; }
        .step-number { font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <div class="chart-wrapper"><canvas id="skillRadar"></canvas></div>
        <div class="stats-wrapper">
            <h1 class="user-name">Minous Progress</h1>
            <div class="total-score">Aufgaben: <span id="stat-count">0</span></div>
            <div id="connection-status" style="font-weight: 600;">Verbinde...</div>
        </div>
    </div>

    <div class="category-card">
        <div class="category-header" onclick="toggleCat(this)">
            <div style="font-weight:700;">🧮 Basics & Algebra</div>
            <div>▼</div>
        </div>
        <div class="category-content open">
            <div class="pill-container">
                <div class="pill" data-id="1">Grundrechenarten</div>
                <div class="pill" data-id="9">Prozentrechnung</div>
                <div class="pill" data-id="12">Binomische Formeln</div>
                <div class="pill" data-id="13">Gleichungen</div>
            </div>
        </div>
    </div>
    </div>

<div class="modal-overlay" id="taskModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button onclick="closeModal(event, true)" style="float:right; cursor:pointer;">✕</button>
        <div id="modal-topic-badge" style="color:var(--primary); font-weight:700; margin-bottom:10px;"></div>
        <div class="task-raw" id="modal-task-text"></div>
        <h3>Lösungsschritte:</h3>
        <div id="modal-solution-steps"></div>
    </div>
</div>



<script>
    const N8N_WEBHOOK_STATS = 'https://steven.agentur-genrich.de/webhook/get-topic-stats'; 
    const N8N_WEBHOOK_TASK = 'https://steven.agentur-genrich.de/webhook/get-exercises'; 
    
    let skillChart;

    async function initDashboard() {
        try {
            const response = await fetch(N8N_WEBHOOK_STATS);
            const topicStats = await response.json(); 
            let total = 0;
            let radarData = { algebra: 0, funktionen: 0, geometrie: 0, stochastik: 0 };

            document.querySelectorAll('.pill').forEach(pill => {
                const id = parseInt(pill.getAttribute('data-id'));
                const count = topicStats[id] || 0;
                pill.innerHTML = `${pill.innerText} (${count})`;
                total += count;
                if (count > 0) {
                    pill.classList.add('active');
                    pill.onclick = () => openTaskModal(id, pill.innerText.split(' (')[0]);
                    if (id <= 15) radarData.algebra += count;
                    else if (id <= 30) radarData.funktionen += count;
                    else if (id <= 47) radarData.geometrie += count;
                    else radarData.stochastik += count;
                }
            });
            document.getElementById('stat-count').innerText = total;
            document.getElementById('connection-status').innerText = "✅ n8n Aktiv";
            updateRadar(radarData);
        } catch (e) { document.getElementById('connection-status').innerText = "❌ n8n Fehler"; }
    }

    async function openTaskModal(topicId, topicName) {
        const modal = document.getElementById('taskModal');
        modal.style.display = 'flex';
        document.getElementById('modal-topic-badge').innerText = topicName;
        document.getElementById('modal-task-text').innerHTML = "Lade...";
        document.getElementById('modal-solution-steps').innerHTML = "";

        try {
            const res = await fetch(`${N8N_WEBHOOK_TASK}?topicId=${topicId}`);
            const data = await res.json();
            
            document.getElementById('modal-task-text').innerHTML = data.task_raw;
            let steps = Array.isArray(data.solution_steps) ? data.solution_steps : JSON.parse(data.solution_steps);
            
            let html = '';
            steps.forEach((s, i) => {
                html += `<div class="solution-step"><b class="step-number">${i+1}.</b> <span>${s}</span></div>`;
            });
            document.getElementById('modal-solution-steps').innerHTML = html;

            // MathJax Rendering triggern
            if (window.MathJax) {
                MathJax.typesetPromise([modal]);
            }
        } catch (e) { document.getElementById('modal-task-text').innerText = "Fehler beim Laden."; }
    }

    function updateRadar(d) {
        if (skillChart) skillChart.destroy();
        skillChart = new Chart(document.getElementById('skillRadar'), {
            type: 'radar',
            data: {
                labels: ['Algebra', 'Funktionen', 'Geometrie', 'Stochastik'],
                datasets: [{ data: [d.algebra, d.funktionen, d.geometrie, d.stochastik], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: '#6366f1' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function toggleCat(h) { h.nextElementSibling.classList.toggle('open'); }
    function closeModal(e, f) { if(f || e.target.id === 'taskModal') document.getElementById('taskModal').style.display='none'; }
    
    initDashboard();
</script>
</body>
</html>
